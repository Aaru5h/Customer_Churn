services:
  # 1. FastAPI Backend ("The Brain")
  - type: web
    name: churn-prediction-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard or it will use the one in .env if pushed
      - key: GROQ_API_KEY
        sync: false # User must set this in the Render dashboard
      - key: DATA_PATH
        value: data/BankChurners.csv
      - key: PIP_EXTRA_INDEX_URL
        value: https://download.pytorch.org/whl/cpu

  # 2. Streamlit Frontend ("The Face")
  - type: web
    name: churn-prediction-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: FASTAPI_URL
        value: http://churn-prediction-backend
      - key: GROQ_API_KEY
        sync: false
      - key: PIP_EXTRA_INDEX_URL
        value: https://download.pytorch.org/whl/cpu
