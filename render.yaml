# Keep-alive strategy (free tier):
# Set up a free external cron at https://cron-job.org to GET
# https://customer-churn-backend-h9yb.onrender.com/ping every 14 minutes.
# This prevents the backend from sleeping on Render's free tier.
# The /ping endpoint is ultra-lightweight and does not trigger model loading.

services:
  # 1. FastAPI Backend ("The Brain")
  - type: web
    name: churn-prediction-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACEHUB_API_TOKEN
        sync: false
      - key: DATA_PATH
        value: data/BankChurners.csv
      - key: PIP_EXTRA_INDEX_URL
        value: https://download.pytorch.org/whl/cpu
      - key: MALLOC_ARENA_MAX
        value: "2"

  # 2. Streamlit Frontend ("The Face")
  - type: web
    name: churn-prediction-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: FASTAPI_URL
        value: https://customer-churn-backend-h9yb.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: PIP_EXTRA_INDEX_URL
        value: https://download.pytorch.org/whl/cpu
